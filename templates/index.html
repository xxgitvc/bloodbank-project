<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<title>BloodBank Goa</title>

<style>
body{font-family:Poppins;background:#f8f9fb;margin:0}
nav{background:#cc0000;padding:15px;color:#fff;display:flex;justify-content:space-between}
a{color:#fff;text-decoration:none;margin-left:10px}
.hero{padding:60px;text-align:center;background:#ff4d4d;color:#fff}
.section{padding:30px}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<nav>
  <div>🩸 BloodBank Goa</div>
  <div>
    <a href="/donor">Donor</a>
    <a href="/hospital">Hospital</a>

    {% if user %}
      <img src="{{ user_pic }}" width="30">
      {{ user }}
      {% if session.get('is_admin') %}
        <a href="/admin">Admin</a>
      {% endif %}
      <a href="/logout">Logout</a>
    {% else %}
      <a href="/login">Login</a>
    {% endif %}
  </div>
</nav>

<div class="hero">
<h1>Saving Lives Across Goa</h1>
</div>

<div class="section">
<h2>Live Donor Locations</h2>

<div id="map" style="height:400px"></div>

<script>
function initMap(){
let map=new google.maps.Map(document.getElementById("map"),{
zoom:10,center:{lat:15.2993,lng:74.1240}
});

let donors={{ donors|tojson }};
donors.forEach(d=>{
if(d.latitude){
new google.maps.Marker({
position:{lat:parseFloat(d.latitude),lng:parseFloat(d.longitude)},
map:map
});
}});
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&callback=initMap" async></script>
</div>

</body>
</html>
