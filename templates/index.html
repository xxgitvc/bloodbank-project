<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BloodBank Goa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{background:#f4f6f9}

/* NAVBAR */
nav{
background:linear-gradient(90deg,#cc0000,#ff4d4d);
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1)
}

.nav-links a{
color:white;
margin-left:15px;
text-decoration:none;
padding:8px 15px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.4);
transition:.3s
}

.nav-links a:hover{
background:white;
color:#cc0000
}

/* HERO */
.hero{
padding:80px;
text-align:center;
background:linear-gradient(135deg,#cc0000,#ff6666);
color:white;
border-bottom-left-radius:40px;
border-bottom-right-radius:40px
}

.hero h1{font-size:40px}

/* MAP CARD */
.card{
background:white;
margin:40px auto;
padding:20px;
width:90%;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1)
}

</style>
</head>

<body>

<nav>
<div>🩸 BloodBank Goa</div>

<div class="nav-links">
<a href="/donor">Donor</a>
<a href="/hospital">Hospital</a>

{% if user %}
<img src="{{ user_pic }}" width="30" style="border-radius:50%">
{{ user }}
<a href="/logout">Logout</a>
{% else %}
<a href="/login">Login</a>
{% endif %}
</div>
</nav>

<div class="hero">
<h1>Saving Lives Across Goa ❤️</h1>
<p>Real-time blood donation system powered by cloud</p>
</div>

<div class="card">
<h2>Live Donor Map</h2>
<div id="map" style="height:400px"></div>
</div>

<script>
function initMap(){
let map=new google.maps.Map(document.getElementById("map"),{
zoom:10,center:{lat:15.2993,lng:74.1240}
});

let donors={{ donors|tojson }};
donors.forEach(d=>{
if(d.latitude){
new google.maps.Marker({
position:{lat:parseFloat(d.latitude),lng:parseFloat(d.longitude)},
map:map
});
}});
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&callback=initMap" async></script>

</body>
</html>
