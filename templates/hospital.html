<!DOCTYPE html>
<html lang="en">
<head link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Portal - BloodBank Goa</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
nav{background:#CC0000;padding:14px 32px;display:flex;justify-content:space-between;align-items:center}
.logo{color:#fff;font-size:22px;font-weight:bold;text-decoration:none}
.nav-links a{color:#fff;text-decoration:none;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.4);margin-left:8px}
.signin{background:#fff;color:#CC0000;font-weight:bold}

.page-header{background:#CC0000;color:#fff;text-align:center;padding:40px}
.container{max-width:1000px;margin:auto;padding:30px}

.form-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:30px}
.form-group{margin-bottom:15px}

button{background:#CC0000;color:#fff;padding:10px 20px;border:none;border-radius:20px}

.hospitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.hosp-card{border:1px solid #eee;padding:15px;border-radius:10px}

</style>
</head>

<body>

<nav>
  <a href="/" class="logo">🩸 BloodBank Goa</a>
  <div class="nav-links">
    <a href="/donor">Donor</a>
    <a href="/hospital">Hospital</a>
    <a href="/login" class="signin">Login</a>
  </div>
</nav>

<div class="page-header">
  <h1>Hospital Portal</h1>
</div>

<div class="container">

  <!-- ================= REQUEST FORM ================= -->
  <div class="form-card">
    <h2>Request Blood</h2>

    <form method="POST" action="/hospital">

      <div class="form-group">
        <label>Select Hospital</label>
        <select name="hospital_id" required>
          <option value="">Choose Hospital</option>
          {% for h in hospitals %}
          <option value="{{ h.hospital_id }}">
            {{ h.hospital_name }} - {{ h.city }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Blood Type Needed</label>
        <select name="blood_type" required>
          <option value="">Select Blood Type</option>
          <option>O+</option>
          <option>O-</option>
          <option>A+</option>
          <option>A-</option>
          <option>B+</option>
          <option>B-</option>
          <option>AB+</option>
          <option>AB-</option>
        </select>
      </div>

      <button type="submit">Find Donors</button>
    </form>
  </div>

  <!-- ================= MATCHED DONORS ================= -->
  {% if matched_donors %}
  <div style="margin-top:30px;">
    <h2 style="color:#CC0000;">🧬 Matching Donors</h2>

    <div class="hospitals-grid">
      {% for d in matched_donors %}
      <div class="hosp-card">
        <h3>{{ d.full_name }}</h3>
        <p><b>Blood:</b> {{ d.blood_type }}</p>
        <p><b>City:</b> {{ d.city }}</p>
        <p><b>Phone:</b> {{ d.phone }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endif %}

</div>

</body>
</html>
