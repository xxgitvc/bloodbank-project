<!DOCTYPE html>
<html>
<body>

<h2>Request Blood</h2>

<form method="POST">
<select name="blood_type">
<option>O+</option>
<option>O-</option>
<option>A+</option>
<option>B+</option>
</select>

<button>Find Donors</button>
</form>

{% if matched_donors %}
<h3>Matching Donors</h3>

{% for d in matched_donors %}
<p>{{ d.full_name }} - {{ d.blood_type }} - {{ d.phone }}</p>
{% endfor %}
{% endif %}

</body>
</html>
